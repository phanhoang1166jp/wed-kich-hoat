<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ライセンス認証システム</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-[#0b0f19] min-h-screen flex items-center justify-center p-6 antialiased selection:bg-cyan-500/20 selection:text-cyan-400 relative overflow-hidden">

  <!-- Hiệu ứng đèn Neon mờ phía sau tạo chiều sâu (Ambient Glow) -->
  <div class="absolute w-[400px] h-[400px] bg-gradient-to-tr from-indigo-600/10 to-cyan-600/10 rounded-full blur-[80px] -top-20 -left-20 pointer-events-none"></div>
  <div class="absolute w-[400px] h-[400px] bg-gradient-to-br from-violet-600/10 to-fuchsia-600/10 rounded-full blur-[80px] -bottom-20 -right-20 pointer-events-none"></div>

  <!-- Card chính với viền phát sáng tinh tế -->
  <div class="bg-[#131b2e]/90 backdrop-blur-xl w-full max-w-lg rounded-2xl shadow-[0_25px_60px_-15px_rgba(0,0,0,0.7)] border border-slate-800 overflow-hidden relative transition-all duration-300 hover:border-slate-700/80">

    <!-- Header -->
    <div class="px-8 pt-8 pb-6 flex items-center justify-between border-b border-slate-800/60">
      <div class="flex items-center gap-4">
        <!-- Icon Badge với hiệu ứng Gradient phát sáng -->
        <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-cyan-500/10 to-indigo-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 text-lg shadow-[0_0_15px_rgba(34,211,238,0.1)]">
          <i class="fa-solid fa-key"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-100 tracking-tight flex items-center gap-2">
            製品ライセンス認証
          </h1>
          <p class="text-[10px] text-cyan-400 font-bold tracking-widest uppercase mt-0.5">Activation Portal</p>
        </div>
      </div>
      <!-- Trạng thái an toàn chuẩn Cyber -->
      <div class="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-lg text-xs font-semibold">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.5)]"></span>
        SECURE
      </div>
    </div>

    <!-- Form nhập liệu chính -->
    <form id="activation-form" class="p-8 space-y-6" onsubmit="event.preventDefault();">

      <!-- Trường số 1: Ref.No. -->
      <div class="space-y-2">
        <label for="ref-no" class="text-xs font-bold text-slate-400 uppercase tracking-wider block">
          参照番号 <span class="text-slate-500 font-normal text-[11px]">（任意）</span>
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
            <i class="fa-regular fa-hashtag text-xs"></i>
          </div>
          <input type="text" id="ref-no" name="ref_no" placeholder="例：123456"
            class="w-full pl-10 pr-4 py-3 bg-[#0f1626] border border-slate-800 rounded-xl text-slate-200 placeholder-slate-600 font-mono text-sm transition-all duration-200 focus:bg-[#0f1626] focus:border-cyan-500 focus:ring-4 focus:ring-cyan-500/10 outline-none">
        </div>
      </div>

      <!-- Trường số 2: Install ID -->
      <div class="space-y-2">
        <div class="flex justify-between items-center">
          <label for="install-id" class="text-xs font-bold text-slate-400 uppercase tracking-wider">
            インストールID 
          </label>
          <span class="text-xs text-cyan-400 font-semibold flex items-center gap-1 hover:text-cyan-300 cursor-pointer transition-colors">
            <i class="fa-regular fa-circle-question"></i> ヘルプ
          </span>
        </div>
        <textarea id="install-id" name="install_id" rows="4" required 
          placeholder="発行されたコードをここに入力または貼り付けてください"
          class="w-full px-4 py-3 bg-[#0f1626] border border-slate-800 rounded-xl text-slate-200 placeholder-slate-600 text-sm transition-all duration-200 focus:bg-[#0f1626] focus:border-cyan-500 focus:ring-4 focus:ring-cyan-500/10 outline-none resize-none font-mono leading-relaxed"></textarea>
        <div class="flex items-start gap-1.5 text-[11px] text-slate-500 leading-normal pt-1">
          <i class="fa-solid fa-circle-info text-slate-600 mt-0.5"></i>
          <span>コピーした文字列をそのまま貼り付けるとシステムが自動的に認識します。</span>
        </div>
      </div>

      <!-- Nút bấm dạng Neon Glow phát sáng -->
      <div class="pt-2">
        <button type="submit"
          class="w-full py-3.5 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-bold text-sm rounded-xl shadow-[0_4px_20px_rgba(34,211,238,0.2)] hover:shadow-[0_4px_25px_rgba(34,211,238,0.35)] active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2 cursor-pointer tracking-wider">
          次へ進む 
          <i class="fa-solid fa-arrow-right text-xs"></i>
        </button>
      </div>

    </form>

    <!-- Footer -->
    <div class="px-8 py-4 bg-[#0f1626]/50 border-t border-slate-800/60 flex justify-between items-center text-[11px] text-slate-500 font-medium">
      <span class="flex items-center gap-1.5">
        <i class="fa-solid fa-lock-keyhole text-cyan-500/70"></i> End-to-End 暗号化
      </span>
      <span>&copy; Activation Server</span>
    </div>

  </div>

</body>
</html>
