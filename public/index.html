<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Office ライセンス認証サポート</title>
    <style>
        :root {
            --primary-color: #0078d4;
            --primary-hover: #106ebe;
            --success-color: #107c41;
            --success-bg: #f1fdf5;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #242424;
            --text-muted: #616161;
            --border-color: #edebe9;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f3f2f1 0%, #e1dfdd 100%);
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 840px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .description {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 3列グリッド */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 680px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .grid-container { grid-template-columns: 1fr; }
            body { padding: 20px 10px; }
            .container { padding: 25px 20px; }
        }

        /* 入力ボックスのデザイン */
        .group-box {
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: calc(var(--radius) - 2px);
            background: #faf9f8;
            position: relative;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .group-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* 完了時のチェックマーク */
        .check-icon {
            color: var(--success-color);
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.25s ease;
        }

        .group-box input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 20px;
            font-family: 'Consolas', monospace;
            text-align: center;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #fff;
            outline: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .group-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.15);
            background-color: #fff;
        }

        /* 7桁入力完了時の美しいスタイル */
        .group-box.valid {
            border-color: rgba(16, 124, 65, 0.4);
            background-color: var(--success-bg);
            box-shadow: 0 4px 10px rgba(16, 124, 65, 0.05);
        }

        .group-box.valid input {
            border-color: var(--success-color);
            background-color: #ffffff;
            color: var(--success-color);
            font-weight: bold;
        }

        .group-box.valid .group-label {
            color: var(--success-color);
        }

        .group-box.valid .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* 送信ボタン */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.24);
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 6px 16px rgba(0, 120, 212, 0.32);
            transform: translateY(-1px);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }

        /* 結果コンテナ */
        .result-container {
            margin-top: 35px;
            padding: 28px;
            border: 2px dashed rgba(16, 124, 65, 0.3);
            background: linear-gradient(180deg, #fcfefe 0%, #f1f9f5 100%);
            border-radius: var(--radius);
            display: none;
            animation: slideUp 0.45s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-weight: 600;
            font-size: 18px;
            color: var(--success-color);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .result-box {
            background: white;
            border: 1px solid #badbc9;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            font-family: 'Consolas', monospace;
            color: var(--success-color);
            letter-spacing: 2px;
            box-shadow: 0 2px 6px rgba(16, 124, 65, 0.04);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <svg width="22" height="22" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h11v11H0z" fill="#f25022"/><path d="M12 0h11v11H12z" fill="#7fba00"/><path d="M0 12h11v11H0z" fill="#00a4ef"/><path d="M12 12h11v11H12z" fill="#ffb900"/></svg>
        インストールID入力欄 (7桁 × 9組)
    </h2>
    <p class="description">
        パソコン画面に表示された63桁のインストールID（IID）を、各グループに7桁ずつ入力してください。<br>
        数字を入力すると自動で次のボックスへ移動し、バックスペースで前のボックスに戻ります。
    </p>

    <!-- 9つの入力欄 -->
    <div class="grid-container" id="inputGrid"></div>

    <button class="btn-submit" onclick="getConfirmationID()">ライセンスを確認して次へ</button>

    <!-- 結果表示エリア -->
    <div class="result-container" id="resultArea">
        <div class="result-title">
            <span>✓</span> 確認ID (Confirmation ID) が発行されました
        </div>
        <p class="description" style="margin-bottom: 20px;">以下のA〜Hの数字を、パソコン画面の【ステップ 3】に順番に入力してください。</p>

        <div class="grid-container" id="resultGrid"></div>
    </div>
</div>

<script>
    const inputGrid = document.getElementById('inputGrid');
    const resultGrid = document.getElementById('resultGrid');

    // 1. 入力ボックス (1~9) を自動生成
    for (let i = 1; i <= 9; i++) {
        const box = document.createElement('div');
        box.className = 'group-box';
        box.id = `box-iid-${i}`;
        box.innerHTML = `
            <div class="group-header">
                <div class="group-label">第 ${i} グループ</div>
                <div class="check-icon">✓</div>
            </div>
            <input type="text" maxlength="7" pattern="[0-9]*" inputmode="numeric" placeholder="0000000" id="iid-input-${i}">
        `;
        inputGrid.appendChild(box);

        const inputEl = box.querySelector('input');
        inputEl.addEventListener('input', (e) => handleInput(e.target, i));
        inputEl.addEventListener('keydown', (e) => handleKeyDown(e, i));
    }

    // 2. 出力ボックス (A~H) を自動生成
    const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
    letters.forEach(letter => {
        const box = document.createElement('div');
        box.innerHTML = `
            <div class="group-label" style="text-align: center; font-weight: bold; margin-bottom: 6px;">${letter}</div>
            <div class="result-box" id="cid-${letter}">000000</div>
        `;
        resultGrid.appendChild(box);
    });

    // 3. 入力制御 & オートフォーカス移動
    function handleInput(input, index) {
        input.value = input.value.replace(/[^0-9]/g, ''); // 数字のみ許可

        const currentBox = document.getElementById(`box-iid-${index}`);

        if (input.value.length === 7) {
            currentBox.classList.add('valid');
            if (index < 9) {
                document.getElementById(`iid-input-${index + 1}`).focus();
            }
        } else {
            currentBox.classList.remove('valid');
        }
    }

    // 4. バックスペースでのスムーズな後退移動
    function handleKeyDown(event, index) {
        if (event.key === 'Backspace' && event.target.value.length === 0) {
            if (index > 1) {
                const prevInput = document.getElementById(`iid-input-${index - 1}`);
                prevInput.focus();
            }
        }
    }

    // 5. 送信ボタン処理 (ダミーデータ出力)
    function getConfirmationID() {
        let allValid = true;
        for (let i = 1; i <= 9; i++) {
            if (document.getElementById(`iid-input-${i}`).value.length !== 7) {
                allValid = false;
                break;
            }
        }

        if (!allValid) {
            alert('すべてのグループに7桁の数字を正しく入力してください。');
            return;
        }

        // ダミーの確認IDを生成
        letters.forEach(letter => {
            const random6Digits = Math.floor(100000 + Math.random() * 900000);
            document.getElementById(`cid-${letter}`).innerText = random6Digits;
        });

        // アニメーション付き表示
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';
        resultArea.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
