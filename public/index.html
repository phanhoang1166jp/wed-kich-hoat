<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Office ライセンス認証ウィザード</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
}
</style>
</head>
<body class="bg-[#f3f2f1] min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-xl rounded-lg shadow-xl border border-[#e1dfdd] overflow-hidden transition-all duration-300 hover:shadow-2xl">

<div class="px-8 pt-8 pb-6 border-b border-[#f3f2f1] flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex-shrink-0 grid grid-cols-2 gap-0.5">
<div class="bg-[#f25022]"></div>
<div class="bg-[#7fba00]"></div>
<div class="bg-[#00a4ef]"></div>
<div class="bg-[#ffb900]"></div>
</div>
<div>
<h1 class="text-xl font-bold text-[#323130] tracking-tight">
Microsoft Office ライセンス認証
</h1>
<p class="text-xs text-[#797775] mt-0.5 font-mono">Office Activation Wizard</p>
</div>
</div>
<div class="flex items-center gap-1 px-2.5 py-1 bg-[#e2f6ed] text-[#107c41] rounded text-xs font-semibold">
<i class="fa-solid fa-shield-halved"></i> 正規版
</div>
</div>

<form id="activation-form" class="p-8 space-y-6">

<div class="space-y-2">
<div class="flex justify-between items-center text-sm">
<label for="ref-no" class="font-semibold text-[#323130]">
Ref.No. <span class="text-xs text-[#797775] font-normal">（省略可能）</span>
</label>
</div>
<input type="text" id="ref-no" name="ref_no"
placeholder="例：123456"
class="w-full px-4 py-2.5 bg-[#f3f2f1] border border-transparent rounded text-[#323130] placeholder-[#a19f9d] font-mono text-sm transition-all focus:bg-white focus:border-[#0078d4] focus:ring-2 focus:ring-[#0078d4]/20 outline-none">
</div>

<div class="space-y-2">
<div class="flex justify-between items-center text-sm">
<label for="install-id" class="font-semibold text-[#323130]">
インストールID <span class="text-xs text-[#797775] font-normal font-mono">(IID)</span>
</label>
<span class="text-xs text-[#0078d4] flex items-center gap-1">
<i class="fa-regular fa-circle-question"></i> 54桁または63桁
</span>
</div>
<textarea id="install-id" name="install_id" rows="3" required
placeholder="インストールIDを入力または貼り付けてください"
class="w-full px-4 py-2.5 bg-[#f3f2f1] border border-transparent rounded text-[#323130] placeholder-[#a19f9d] text-sm transition-all focus:bg-white focus:border-[#0078d4] focus:ring-2 focus:ring-[#0078d4]/20 outline-none resize-none font-mono tracking-wider"></textarea>
<p class="text-[11px] text-[#797775]">※ 数字をそのままコピー＆ペーストしていただくだけで自動的にスペースが挿入されます。</p>
</div>

<div class="pt-2 flex justify-end">
<button type="submit"
class="px-10 py-2.5 bg-[#0078d4] hover:bg-[#106ebe] active:bg-[#005a9e] text-white font-semibold text-sm rounded shadow-sm transition-colors duration-150 flex items-center gap-2 cursor-pointer">
次へ <i class="fa-solid fa-chevron-right text-xs"></i>
</button>
</div>

</form>

<div class="px-8 py-4 bg-[#faf9f8] border-t border-[#f3f2f1] flex justify-between items-center text-[11px] text-[#a19f9d]">
<span class="flex items-center gap-1.5"><i class="fa-solid fa-lock text-emerald-600"></i> SSL 暗号化通信（安全）</span>
<span>&copy; Microsoft Activation Assistant</span>
</div>

</div>

<script>
const installIdInput = document.getElementById('install-id');

installIdInput.addEventListener('input', function (e) {
// 1. Xóa toàn bộ ký tự không phải số và các dấu cách cũ
let value = e.target.value.replace(/\D/g, '');

// 2. Định dạng mặc định: Cụm 7 số (loại tổng cộng 63 chữ số)
let chunkLength = 7;

// Nếu độ dài chuỗi phù hợp với loại 54 số (chia hết cho 6 cụm)
if (value.length <= 54 && value.length % 6 === 0 && value.length > 0) {
chunkLength = 6;
}

// 3. Cắt chuỗi số dính liền thành từng cụm nhỏ
let chunks = [];
for (let i = 0; i < value.length; i += chunkLength) {
chunks.push(value.substr(i, chunkLength));
}

// 4. Ghép lại với nhau bằng dấu cách và hiển thị lên ô nhập liệu
e.target.value = chunks.join(' ');
});

// Xử lý mượt mà khi khách click chuột phải dán (Paste)
installIdInput.addEventListener('paste', function (e) {
setTimeout(() => {
installIdInput.dispatchEvent(new Event('input'));
}, 10);
});
</script>

</body>
</html>
